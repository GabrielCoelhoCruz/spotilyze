services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotilyze
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - AUTO_SYNC_ENABLED=true
      - AUTO_SYNC_INTERVAL_MINUTES=360
      - AUTO_SYNC_STALE_MINUTES=30
    restart: unless-stopped
